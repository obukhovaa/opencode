name: test-mysql

# MySQL integration tests live behind the `mysql_integration` build tag so
# they don't run as part of the default `go test ./...` path on developer
# laptops. CI runs them in this separate workflow against the MySQL service
# container declared below.

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    paths:
      - 'internal/db/**'
      - 'internal/bridge/**'
      - 'docker-compose.test-mysql.yml'
      - 'Makefile'
      - '.github/workflows/test-mysql.yml'

permissions:
  contents: read

jobs:
  test-mysql:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0.39
        env:
          MYSQL_ROOT_PASSWORD: testroot
          MYSQL_DATABASE: opencode_test
          MYSQL_USER: opencode_test
          MYSQL_PASSWORD: opencode_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -ptestroot"
          --health-interval=3s
          --health-timeout=3s
          --health-retries=30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ">=1.23.2"
          cache: true
          cache-dependency-path: go.sum

      - run: go mod download

      - name: Allow non-SUPER user to create triggers
        # MySQL 8 with binary logging (default) requires SUPER privilege
        # to CREATE TRIGGER unless log_bin_trust_function_creators is ON.
        # Our migrations run as the non-SUPER `opencode_test` user and
        # include trigger definitions (e.g. update_sessions_updated_at
        # in 20250424200609_initial.sql) — without this flag the goose
        # up step fails with `Error 1419 (HY000): You do not have the
        # SUPER privilege …`. Setting the GLOBAL via root before tests
        # is the standard workaround for restricted-user CI setups.
        env:
          MYSQL_PWD: testroot
        run: |
          mysql -h 127.0.0.1 -P 3307 -u root -e "SET GLOBAL log_bin_trust_function_creators=ON;"

      - name: Run mysql_integration tests
        env:
          TEST_MYSQL_DSN: "opencode_test:opencode_test@tcp(127.0.0.1:3307)/opencode_test?parseTime=true&multiStatements=true"
        # Scope to the packages that actually host mysql_integration-tagged
        # files. `./...` with the tag still builds + runs everything else
        # (the tag is additive, not exclusive), which has bitten us:
        # internal/llm/tools grep tests assert ripgrep-shaped output and
        # fail on minimal runner images that lack rg in $PATH. Those
        # failures aren't this workflow's concern — the default test job
        # in build.yml is responsible for grep, and develops can install
        # ripgrep there separately. Listing the two packages here keeps
        # the signal tight: one of these failing means a real MySQL
        # regression, not unrelated CI environment drift.
        #
        # -p 1 serialises packages. Both internal/db and internal/bridge/
        # store share the single TEST_MYSQL_DSN-pointed database and each
        # DROP TABLEs + goose-ups in their per-test setup helpers; with
        # default parallelism they collide on the shared schema (one
        # package's DROP wipes the other's mid-migration). Per-package
        # DSN isolation would be cleaner but is invasive — serialising
        # is the one-line fix that matches the comment in
        # newMySQLTestStore ("we drop all tables before each migration
        # to keep tests independent" implicitly assumes sequential).
        run: go test -tags=mysql_integration -count=1 -p 1 ./internal/db/... ./internal/bridge/store/...
